<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .ios-blur { backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .ios-card { background: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.6); border-radius: 1.3rem; box-shadow: 0 10px 24px rgba(0,0,0,0.12); }
        @keyframes pulse-blue { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.04);opacity:.85;} }
        .animate-pulse-blue { animation: pulse-blue 2s infinite ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
    </style>
</head>

<body class="bg-[#F2F2F7] h-screen overflow-hidden p-6 md:p-10">
    <div class="h-full grid grid-cols-12 gap-6">
        
        <!-- Left Column: Financial Queues -->
        <div class="col-span-12 xl:col-span-4 flex flex-col gap-4">
            <div class="ios-card p-4 h-full flex flex-col">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-4 flex-none">Financial Services</h3>
                <div id="finance_container" class="space-y-4 overflow-y-auto no-scrollbar flex-1">
                    <div class="flex items-center justify-center h-full text-gray-400 font-medium italic text-sm">
                        Loading services...
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Main Serving & Waiting -->
        <div class="col-span-8 flex flex-col gap-8">
            
            <!-- Currently Serving Main -->
            <div class="ios-card !bg-gradient-to-br !from-blue-500 !to-indigo-600 !border-none flex flex-col items-center justify-center py-10 text-white relative overflow-hidden">
                <div class="absolute inset-0 bg-white/20 pointer-events-none"></div>
                <span class="text-xs font-black uppercase tracking-[0.35em] opacity-80 mb-2">Now Serving</span>
                <div id="display_current" class="text-6xl md:text-8xl font-black leading-none animate-pulse-blue tracking-tight">None</div>
                <div id="display_info" class="mt-3 text-lg font-semibold opacity-95"></div>
            </div>

            <!-- Main Waiting List -->
            <div class="ios-card flex flex-col p-6 overflow-hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400">Coming Up Next</h3>
                    <span class="text-xs font-semibold text-gray-500">Live Queue</span>
                </div>
                <div class="overflow-x-auto">
                    <table id="display_waiting" class="w-full text-left">
                        <thead>
                            <tr class="text-xs font-bold text-gray-400 uppercase tracking-wider">
                                <th class="pb-3 px-3">Queue No</th>
                                <th class="pb-3 px-3 text-center">Patient No</th>
                                <th class="pb-3 px-3 text-right">Department</th>
                            </tr>
                        </thead>
                        <tbody class="text-lg font-semibold text-gray-800">
                            <tr><td class="py-3 px-3" colspan="3" class="text-center text-gray-400">No one waiting</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Event Banner -->
    <div id="event_banner" class="hidden fixed top-10 left-1/2 -translate-x-1/2 ios-blur bg-orange-400/90 text-white px-8 py-4 rounded-3xl shadow-2xl font-bold text-2xl z-50 border border-orange-300"></div>

    <!-- Audio -->
    <audio id="queue_bell" preload="auto" class="hidden">
        <source src="../assets/bell.ogg" type="audio/ogg">
    </audio>

    <script>
        var audioUnlocked = false;
        function unlockAudio(){
            if(audioUnlocked) return;
            var audio = document.getElementById('queue_bell');
            if(audio){
                audio.volume = 0.8;
                var playPromise = audio.play();
                if(playPromise){
                    playPromise.then(function(){
                        audio.pause();
                        audio.currentTime = 0;
                        audioUnlocked = true;
                        console.log('Audio unlocked');
                    }).catch(function(err){
                        console.warn('Audio unlock failed:', err);
                    });
                }
            }
        }
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('keydown', unlockAudio, { once: true });
    </script>
    <script src="../assets/js/patient-display.js"></script>
</body>
</html>
