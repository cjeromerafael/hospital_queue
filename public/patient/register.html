<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .ios-card { background: rgba(255,255,255,0.92); border: 1px solid rgba(255,255,255,0.7); border-radius: 1.6rem; box-shadow: 0 14px 30px rgba(0,0,0,0.1); }
        .btn-ios { display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 999px; padding: 0.7rem 1rem; font-weight: 700; font-size: 1rem; gap: 0.35rem; cursor: pointer; transition: all .15s ease; }
        .btn-ios-primary { background: #3b82f6; color: #fff; box-shadow: 0 8px 18px rgba(59,130,246,0.25); }
        .btn-ios-primary:hover { background: #2563eb; }
        .btn-ios-secondary { background: #f3f4f6; color: #1f2937; }
        .btn-ios-secondary:hover { background: #e5e7eb; }
        .input-ios { width: 100%; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 0.75rem 1rem; }
        .input-ios:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
        .label-ios { display: block; margin-bottom: 0.2rem; font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: #6b7280; }
    </style>
</head>

<body class="bg-[#F2F2F7] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl space-y-8">
        
        <button onclick="window.location.href='index.html'" class="btn-ios-secondary !rounded-full !px-4 !py-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            Back
        </button>

        <div class="ios-card space-y-8">
            <div class="text-center space-y-2">
                <div class="w-20 h-20 bg-blue-500 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-blue-200">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-900 pt-4 tracking-tight">Register Patient</h1>
                <p id="currentDateDisplay" class="text-blue-600 font-bold uppercase tracking-widest text-xs"></p>
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label for="patient_department" class="label-ios">Select Department</label>
                    <div class="relative">
                        <select id="patient_department" class="input-ios">
                            <option value="">Select department</option>
                        </select>
                        <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>
                </div>

                <button id="assign_queue_btn_public" onclick="registerPatient()" class="btn-ios btn-ios-primary w-full py-3">
                    Assign Queue
                </button>
            </div>

            <p id="register_result" class="text-center font-bold text-lg min-h-[2rem]"></p>
        </div>

    </div>

    <script src="../assets/js/patient-register.js"></script>
</body>
</html>
