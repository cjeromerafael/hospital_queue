<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Queue Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .ios-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .ios-card { background: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.65); border-radius: 1.3rem; padding: 1.25rem; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .btn-ios { display: inline-flex; align-items:center; justify-content:center; border:none; border-radius:999px; padding:0.55rem 0.9rem; font-weight:600; font-size:.95rem; transition: all .18s ease; cursor:pointer; }
        .btn-ios-secondary { background:#f3f4f6; color:#111827; }
        .btn-ios-secondary:hover { background:#e5e7eb; }
        .current-badge { background:#22c55e; color:white; padding:0.75rem 1.25rem; border-radius:1rem; font-weight:800; font-size:2rem; box-shadow:0 10px 24px rgba(34,197,94,0.2); }
        table { width:100%; border-collapse: separate; border-spacing:0; }
        th { background:#f9fafb; color:#6b7280; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; padding:.7rem .8rem; text-align:left; }
        td { padding:.7rem .8rem; font-size:.9rem; color:#111827; border-top:1px solid #e5e7eb; }
    </style>
</head>

<body class="bg-[#F2F2F7] min-h-screen p-6 md:p-10">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <button onclick="window.location.href='../index.html'" class="btn-ios-secondary !rounded-full !px-4 !py-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            Back
        </button>

        <header class="text-center space-y-4">
            <h1 class="text-3xl font-extrabold text-gray-900 pt-4 tracking-tight">Patient Access</h1>
            <p id="currentDateDisplay" class="text-blue-600 font-bold uppercase tracking-widest text-sm"></p>
        </header>

        <div class="ios-card text-center space-y-4">
            <span class="text-xs font-black uppercase tracking-[0.3em] text-gray-400">Now Serving</span>
            <div id="currentQueue" class="current-badge block mx-auto w-fit">—</div>
            <p id="msg" class="text-red-500 font-medium"></p>
        </div>

        <div class="ios-card !p-0 overflow-hidden">
            <div class="px-8 py-6 border-b border-gray-100/50">
                <h3 class="text-lg font-bold text-gray-900">All Departments Queue</h3>
            </div>
            <div class="overflow-x-auto">
                <table id="waitingTable"></table>
            </div>
        </div>

    </div>

    <script src="../assets/js/patient-queue.js"></script>
</body>
</html>
