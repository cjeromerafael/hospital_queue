<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-[#F2F2F7] min-h-screen p-4 md:p-8">
    <div class="page-shell w-full space-y-8">

        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 px-4">
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Admin Dashboard</h1>
                <p class="text-gray-500 font-medium flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    Logged in as <span id="userInfoDisplay" class="text-gray-700 font-semibold">Administrator</span>
                </p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="switchToStaffDashboard()" class="btn-ios btn-ios-secondary !bg-green-50 !text-green-700 !border !border-green-200 hover:!bg-green-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Staff Dashboard
                </button>
                <button onclick="logout()" class="btn-ios btn-ios-danger !bg-red-500 !text-white !px-3 !py-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </header>

        <!-- Date / Flush -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="ios-card md:col-span-2 p-4">
                <span class="label-ios">Today's Date</span>
                <span id="currentDateDisplay" class="text-4xl md:text-5xl font-black text-blue-600 tracking-tight">Loading...</span>
            </div>
            <div class="ios-card flash-card p-4">
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <span class="pill">System Maintenance</span>
                        <h3 class="text-xl font-bold text-red-900 mt-2 mb-1">Flush All Data</h3>
                        <p class="text-sm text-red-700">Use only in emergencies.</p>
                        <p class="text-xs text-red-500 mt-1">Admin only</p>
                    </div>
                    <button onclick="manualFlush()" class="btn-pill btn-pill-danger">Flush</button>
                </div>
                <p id="flushMsg" class="mt-3 text-xs font-medium text-red-600"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Departments -->
            <section class="space-y-6">
                <div class="ios-card p-6">
                    <h3 class="text-xl font-bold text-gray-900 mb-6">Add Department</h3>
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex-1">
                            <label class="label-ios">Name</label>
                            <input id="deptName" placeholder="e.g. Cardiology" class="input-ios">
                        </div>
                        <div class="flex-shrink-0" style="width:6rem">
                            <label class="label-ios">Color</label>
                            <input id="deptColor" type="color" value="#8B0000" class="h-10 input-ios" style="width:100%;padding:0.25rem;">
                        </div>
                    </div>
                    <button onclick="addDepartment()" class="btn-ios btn-ios-primary w-full mt-6">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                        Add Department
                    </button>
                </div>

                <div class="ios-card !p-0 overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-100/50">
                        <h3 class="text-lg font-bold text-gray-900">Departments List</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table id="deptTable"></table>
                    </div>
                </div>
            </section>

            <!-- Users -->
            <section class="space-y-6">
                <div class="ios-card p-6">
                    <h3 class="text-xl font-bold text-gray-900 mb-6">Create New User</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label-ios">Username</label>
                            <input id="userUsername" placeholder="Enter username" class="input-ios">
                        </div>
                        <div>
                            <label class="label-ios">Password</label>
                            <div class="relative">
                                <input id="userPassword" type="password" placeholder="Enter password" class="input-ios pr-12">
                                <button onclick="togglePasswordVisibility('userPassword')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <span class="text-xl">&#128065;</span>
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-ios">Role</label>
                                <select id="userRole" onchange="toggleUserDeptVisibility()" class="input-ios appearance-none">
                                    <option value="staff">Staff</option>
                                    <option value="admin">Admin</option>
                                    <option value="sysadmin">SysAdmin</option>
                                </select>
                            </div>
                            <div id="deptSelectContainer">
                                <label class="label-ios">Department</label>
                                <select id="userDeptSelect" class="input-ios appearance-none"></select>
                            </div>
                        </div>
                    </div>
                    <button onclick="addUser()" class="btn-ios btn-ios-primary w-full mt-6">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                        Create User
                    </button>
                </div>

                <div class="ios-card !p-0 overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-100/50">
                        <h3 class="text-lg font-bold text-gray-900">System Users</h3>
                    </div>
                    <div class="table-scroll">
                        <table id="userTable"></table>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script src="../assets/js/admin.js"></script>

    <!-- Edit User Dropdown Card — anchored near the triggering row -->
    <div id="editUserModal" style="position:fixed; z-index:9999; width:22rem; background:#fff; border-radius:1rem; box-shadow:0 8px 32px rgba(0,0,0,0.18); border:1px solid #e5e7eb; padding:1.25rem; flex-direction:column; gap:0.85rem;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.25rem;">
            <span style="font-size:0.9rem; font-weight:700; color:#111827;">Edit User</span>
            <button type="button" onclick="closeEditUserModal()" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:1.2rem;line-height:1;padding:0 0.25rem;">&times;</button>
        </div>
        <div>
            <label class="label-ios">Username</label>
            <input id="editUsername" type="text" class="input-ios">
        </div>
        <div>
            <label class="label-ios">New Password <span style="font-weight:400;text-transform:none;font-size:0.68rem;color:#9ca3af;">(blank = keep)</span></label>
            <div style="position:relative;">
                <input id="editPassword" type="password" placeholder="New password" class="input-ios" style="padding-right:2.5rem;">
                <button type="button" onclick="togglePasswordVisibility('editPassword')" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;">&#128065;</button>
            </div>
        </div>
        <div>
            <label class="label-ios">Role</label>
            <select id="editRole" class="input-ios" style="-webkit-appearance:none;"></select>
        </div>
        <div id="editDeptContainer">
            <label class="label-ios">Department</label>
            <select id="editDept" class="input-ios" style="-webkit-appearance:none;"></select>
        </div>
        <div style="display:flex;gap:0.5rem;padding-top:0.25rem;">
            <button id="editUserSaveBtn" type="button" class="btn-ios btn-ios-primary" style="flex:1;">Save</button>
            <button type="button" onclick="closeEditUserModal()" class="btn-ios btn-ios-secondary" style="flex:1;">Cancel</button>
        </div>
    </div>
</body>
</html>
