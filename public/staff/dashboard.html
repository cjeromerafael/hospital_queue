<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .ios-card { background: rgba(255,255,255,0.94); border:1px solid #e9efff; border-radius:1.4rem; box-shadow: 0 10px 24px rgba(0,0,0,0.06); }
        .btn-ios { display:inline-flex; align-items:center; justify-content:center; border:none; border-radius:999px; padding:.6rem 1rem; font-weight:600; font-size:.9rem; gap:.35rem; cursor:pointer; transition:.2s ease; min-height:2.4rem; text-decoration:none; outline:none; }
        .btn-ios:focus { outline:none; box-shadow:0 0 0 3px rgba(59,130,246,0.2); }
        .btn-ios-primary, .btn-ios-secondary, .btn-ios-danger { border-radius:999px; white-space:nowrap; }
        .btn-ios-primary { background:#3b82f6; color:white; box-shadow:0 6px 16px rgba(59,130,246,0.24); }
        .btn-ios-primary:hover { background:#2563eb; }
        .btn-ios-secondary { background:#f3f4f6; color:#111827; }
        .btn-ios-secondary:hover { background:#e5e7eb; }
        .btn-ios-danger { background:#ef4444; color:white; }
        .btn-ios-danger:hover { background:#dc2626; }
        .btn-ios svg { margin-right: .2rem; }
        .btn-ios-primary, .btn-ios-secondary, .btn-ios-danger { white-space:nowrap; }

        .input-ios { width:100%; background:#f9fafb; border:1px solid #e2e8f0; border-radius:.85rem; padding:.65rem .8rem; }
        .input-ios:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .label-ios { display:block; margin-bottom:.15rem; font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; color:#6b7280; font-weight:700; }
        .section-title { font-size:1.05rem; font-weight:800; margin-bottom:.45rem; color:#0f172a; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #f9fafb; color: #6b7280; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.55rem 0.75rem; text-align: left; }
        td { padding: 0.65rem 0.75rem; color: #111827; border-top: 1px solid #e5e7eb; }
        .current-badge { background: #3b82f6; color: white; padding: 0.4rem 0.75rem; border-radius: 0.6rem; font-weight: 800; font-size: 1.35rem; }
    </style>
</head>

<body class="bg-[#F2F2F7] min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 px-4">
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Staff Dashboard</h1>
                <p class="text-gray-500 font-medium flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    <span id="userInfoDisplay" class="text-gray-700 font-semibold text-lg">Loading user...</span>
                </p>
            </div>
            <button onclick="logout()" class="btn-ios btn-ios-danger">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                Logout
            </button>
        </header>

        <!-- Date Card -->
        <div class="ios-card flex flex-col justify-center p-5 md:p-6">
            <span class="label-ios">Current Date</span>
            <span id="currentDateDisplay" class="text-4xl font-black text-blue-600 tracking-tight">Loading...</span>
        </div>

        <!-- Main Queue Section -->
        <div id="mainQueueSection" class="space-y-6 hidden">
            <div class="ios-card bg-blue-50/50 border-blue-100 p-5 md:p-6">
                <h2 id="dashboardDeptName" class="text-2xl font-black text-blue-900 tracking-tight">Department Name</h2>
            </div>

            <div class="ios-card p-5 md:p-6">
                <h3 class="text-xl font-bold text-gray-900 mb-4">Create Queue Entry</h3>
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="flex-1">
                        <label for="new_patient_select" class="label-ios">Patient Number</label>
                        <select id="new_patient_select" class="input-ios">
                            <option value="">Select patient</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="createQueue()" class="btn-ios btn-ios-primary px-5 py-2.5 h-11">Add to Queue</button>
                    </div>
                </div>
            </div>

            <div class="ios-card p-5 md:p-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <span class="label-ios">Now Serving</span>
                        <div id="currentQueue" class="current-badge">None</div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="next()" class="btn-ios btn-ios-primary px-4 py-2">Next</button>
                        <button onclick="skipCurrent()" class="btn-ios btn-ios-danger px-4 py-2">Skip</button>
                        <button onclick="window.location.href='../patient/manage.html'" class="btn-ios btn-ios-secondary px-4 py-2">Manage</button>
                        <button onclick="openQueueDisplay()" class="btn-ios btn-ios-secondary px-4 py-2">Display</button>
                    </div>
                </div>
            </div>

            <div class="ios-card !p-0 overflow-hidden">
                <div class="px-8 py-6 border-b border-gray-100/50">
                    <h3 class="text-lg font-bold text-gray-900">Waiting Queue</h3>
                </div>
                <div class="overflow-x-auto">
                    <table id="queueTable"></table>
                </div>
            </div>
        </div>

    </div>

    <!-- Audio -->
    <audio id="queue_bell" preload="auto" class="hidden">
        <source src="../assets/bell.ogg" type="audio/ogg">
    </audio>

    <script src="../assets/js/staff.js"></script>
</body>
</html>
