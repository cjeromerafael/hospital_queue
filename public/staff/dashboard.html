<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-[#F2F2F7] min-h-screen p-4 md:p-8">
    <div class="max-w-[1400px] mx-auto flex flex-col gap-5">
        <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div class="space-y-1">
                <h1 class="text-2xl sm:text-3xl lg:text-4xl font-extrabold text-gray-900 tracking-tight">Staff Queue Controls</h1>
                <p id="userInfoDisplay" class="text-gray-600 font-semibold">-</p>
            </div>

            <div class="flex flex-wrap items-center gap-2 sm:gap-3">
                <div class="ios-card px-5 py-3">
                    <div class="text-[11px] font-black uppercase tracking-[0.22em] text-gray-500">Date & Time</div>
                    <div id="currentDateDisplay" class="text-lg font-black text-gray-900 leading-tight">Loading...</div>
                </div>

                <button id="backToAdminBtn" onclick="backToAdminDashboard()" style="display:none;background:#3b82f6;"
                    class="btn-ios group relative overflow-hidden !px-4 !py-2.5 text-white shadow-sm transition-all duration-200 ease-out hover:shadow-md hover:-translate-y-[1px] active:scale-95">
                    <span class="absolute inset-0 opacity-0 group-hover:opacity-100 transition duration-300 bg-gradient-to-r from-transparent via-white/20 to-transparent"></span>
                    <svg class="w-5 h-5 text-white/90 group-hover:text-white transition relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    <span class="relative z-10">Back to Admin</span>
                </button>

                <a href="../patient/display.html" target="_blank" rel="noopener noreferrer"
                    class="btn-ios btn-ios-secondary group relative overflow-hidden !px-4 !py-2.5 bg-white/80 backdrop-blur-sm text-gray-700 shadow-sm transition-all duration-200 ease-out hover:bg-white hover:shadow-md hover:-translate-y-[1px] active:scale-95">
                    <span class="absolute inset-0 opacity-0 group-hover:opacity-100 transition duration-300 bg-gradient-to-r from-transparent via-[#34c759]/10 to-transparent"></span>
                    <svg class="w-5 h-5 text-gray-500 group-hover:text-[#34c759] transition relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <span class="relative z-10">Queue Display</span>
                </a>

                <button onclick="logout()"
                    class="btn-ios group relative overflow-hidden !px-4 !py-2.5 text-white shadow-sm transition-all duration-200 ease-out hover:shadow-md hover:-translate-y-[1px] active:scale-95" style="background:#ef4444;">
                    <span class="absolute inset-0 opacity-0 group-hover:opacity-100 transition duration-300 bg-gradient-to-r from-transparent via-white/20 to-transparent"></span>
                    <svg class="w-5 h-5 text-white/90 group-hover:text-white transition relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    <span class="relative z-10">Logout</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-auto">
            <div id="deptGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 content-start"></div>
        </div>

        <p class="text-xs text-gray-500">
            Tip: Use <span class="font-bold">Reset</span> per department to return it back to queue #0.
        </p>
    </div>

    <script src="../assets/js/staff.js"></script>
    <script>
        function logout() {
            fetch("../../api/auth/logout.php", { method: "POST", credentials: "same-origin" })
                .finally(() => {
                    localStorage.removeItem("user_id");
                    localStorage.removeItem("department_id");
                    localStorage.removeItem("role");
                    localStorage.removeItem("username");
                    window.location.href = "/login";
                });
        }
    </script>
</body>
</html>
