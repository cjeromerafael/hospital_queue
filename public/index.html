<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Queue Login</title>
    <link rel="stylesheet" href="./assets/css/tailwind.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <div class="fixed inset-0 z-0">
        <img src="assets/CCH_background.png" alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-[2px]"></div>
    </div>

    <div class="login-card bg-white/80 ios-blur ios-shadow border border-white/50 rounded-[2.5rem] z-10 relative">

        <div class="icon-section">
            <div class="login-icon bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                <svg class="text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <h1 class="login-title">Queueing System</h1>
            <p class="text-gray-500 font-medium text-sm">Please sign in to continue</p>
        </div>

        <div class="fields-section">
            <div class="field-group">
                <label for="username" class="text-[13px] font-semibold text-gray-500 ml-4 uppercase tracking-wider">Username</label>
                <input id="username" placeholder="Enter username" class="login-input">
            </div>
            <div class="field-group">
                <label for="password" class="text-[13px] font-semibold text-gray-500 ml-4 uppercase tracking-wider">Password</label>
                <input id="password" type="password" placeholder="Enter password" class="login-input">
            </div>
        </div>

        <div class="actions-section">
            <button onclick="login()" class="login-btn">Sign In</button>
            <p id="msg" class="text-center text-red-500 font-medium min-h-[1.25rem] text-sm"></p>
        </div>

    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
