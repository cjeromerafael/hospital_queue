<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Queue Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .ios-shadow { box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }

        /* Login card — scales with viewport height so it fits both 768px and 1080px screens */
        .login-card {
            width: 100%;
            max-width: 28rem;
            padding: clamp(1.25rem, 3.5vh, 2.5rem);
            gap: clamp(0.875rem, 2.5vh, 2rem);
            display: flex;
            flex-direction: column;
        }

        .login-icon {
            width: clamp(2.75rem, 7.5vh, 5rem);
            height: clamp(2.75rem, 7.5vh, 5rem);
        }
        .login-icon svg {
            width: 55%;
            height: 55%;
        }

        .login-title {
            font-size: clamp(1.2rem, 3vh, 1.875rem);
            font-weight: 700;
            color: #111827;
            padding-top: clamp(0.125rem, 0.8vh, 1rem);
            line-height: 1.2;
        }

        .login-input {
            width: 100%;
            background: rgba(243, 244, 246, 0.5);
            border: none;
            border-radius: 1rem;
            padding: clamp(0.55rem, 1.4vh, 1rem) 1.5rem;
            font-size: clamp(0.875rem, 1.7vh, 1.125rem);
            outline: none;
            transition: box-shadow 0.2s;
            box-sizing: border-box;
        }
        .login-input:focus {
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .login-btn {
            width: 100%;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            padding: clamp(0.55rem, 1.4vh, 1rem) 1.5rem;
            border-radius: 1rem;
            font-size: clamp(0.875rem, 1.7vh, 1.125rem);
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
        }
        .login-btn:hover { background: #2563eb; }
        .login-btn:active { transform: scale(0.98); }

        .icon-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.25rem, 0.8vh, 0.5rem);
        }
        .fields-section {
            display: flex;
            flex-direction: column;
            gap: clamp(0.5rem, 1.5vh, 1rem);
        }
        .field-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .actions-section { display: flex; flex-direction: column; gap: 0.5rem; }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <!-- Background Image with Overlay -->
    <div class="fixed inset-0 z-0">
        <img src="assets/CCH_background.png" alt="Background" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-[2px]"></div>
    </div>

    <div class="login-card bg-white/80 ios-blur ios-shadow border border-white/50 rounded-[2.5rem] z-10 relative">

        <div class="icon-section">
            <div class="login-icon bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                <svg class="text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <h1 class="login-title">Queueing System</h1>
            <p class="text-gray-500 font-medium text-sm">Please sign in to continue</p>
        </div>

        <div class="fields-section">
            <div class="field-group">
                <label for="username" class="text-[13px] font-semibold text-gray-500 ml-4 uppercase tracking-wider">Username</label>
                <input id="username" placeholder="Enter username" class="login-input">
            </div>
            <div class="field-group">
                <label for="password" class="text-[13px] font-semibold text-gray-500 ml-4 uppercase tracking-wider">Password</label>
                <input id="password" type="password" placeholder="Enter password" class="login-input">
            </div>
        </div>

        <div class="actions-section">
            <button onclick="login()" class="login-btn">Sign In</button>
            <p id="msg" class="text-center text-red-500 font-medium min-h-[1.25rem] text-sm"></p>
        </div>

    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
